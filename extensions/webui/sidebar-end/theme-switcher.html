<script type="module">
  const initThemeStore = () => {
    if (!Alpine.store('themePlugin')) {
      Alpine.store('themePlugin', {
        currentTheme: localStorage.getItem('a0-theme') || 'default',
        setTheme(theme) {
          this.currentTheme = theme;
          localStorage.setItem('a0-theme', theme);
          this.applyTheme();
        },
        applyTheme() {
          document.body.setAttribute('data-theme', this.currentTheme);
        }
      });
      Alpine.store('themePlugin').applyTheme();
    }
  };

  if (window.Alpine) {
    initThemeStore();
  } else {
    document.addEventListener('alpine:init', initThemeStore);
  }
  
  if (localStorage.getItem('a0-theme')) {
      document.body.setAttribute('data-theme', localStorage.getItem('a0-theme'));
  }
</script>
